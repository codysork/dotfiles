[global/wm]
margin-top = 0
margin-bottom = 0

;==========================================================

[settings]
screenchange-reload = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

;==========================================================

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/modules_custom.ini

;==========================================================

[bar/bottom]
bottom = true
background = ${colors.background}
foreground = ${colors.foreground}
fixed-center = true

height = 30
line-size = 2
tray-position = none
tray-detached = false

;==========================================================


font-0 = "Source Code Pro Semibold:size=10;1"
font-1 = "Font Awesome 5 Free:style=Solid:size=10;1"
font-2 = "Font Awesome 5 Brands:size=10;1"
font-3 = "NotoEmoji Nerd Font:size=10;1"
font-4 = "Noto Sans Symbols2:size=10;1"

;==========================================================

modules-left = battery backlight pulseaudio cpu memory temperature eth wlan seperator updates-arch-combined
modules-right = filesystem

cursor-click = pointer
cursor-scroll = ns-resize


